<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="vortex.fun — games and tools website project for NEA." />
  <title>vortex.fun</title>

  <style>
    :root {
      color-scheme: dark light;
      --bg: #000;
      --text: #b4b4b4;
      --subtext: #555;
      --surface: rgba(0, 0, 0, 0.45);
      --surface-border: rgba(255, 255, 255, 0.25);
      --accent-1: rgba(251, 255, 0, 0.8);
      --accent-2: rgba(51, 255, 0, 0.575);
      --shape-1: rgba(244, 63, 93, 0.534);
      --shape-2: rgba(255, 251, 0, 0.493);
      --transition: 0.33s ease;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
      padding: 64px 0 128px;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
      transition: background var(--transition), color var(--transition);
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.6;
      pointer-events: none;
      transition: background var(--transition), opacity var(--transition);
    }

    body::before {
      width: 280px;
      height: 280px;
      top: -80px;
      left: -80px;
      background: var(--accent-1);
    }

    body::after {
      width: 280px;
      height: 280px;
      bottom: -80px;
      right: -60px;
      background: var(--accent-2);
    }

    .shape {
      position: absolute;
      width: 240px;
      height: 240px;
      border-radius: 30%;
      background: var(--shape-1);
      top: 15%;
      right: 10%;
      transform: rotate(25deg);
      filter: blur(0.5px);
      pointer-events: none;
      transition: background var(--transition), transform var(--transition);
    }

    .shape.alt {
      width: 200px;
      height: 200px;
      border-radius: 40%;
      background: var(--shape-2);
      bottom: 12%;
      left: 8%;
      transform: rotate(-20deg);
    }

    .theme-toggle {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 2;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid var(--surface-border);
      border-radius: 999px;
      background: var(--surface);
      color: #fff;
      cursor: pointer;
      backdrop-filter: blur(12px);
      transition: background var(--transition), color var(--transition), border-color var(--transition);
    }

    .top-text,
    .sub-text,
    .bottom-text,
    .link-button {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 0 24px;
      margin: 0;
    }

    .top-text {
      font-size: clamp(32px, 6vw, 48px);
      font-weight: 700;
      letter-spacing: 1px;
    }

    .link-button {
      display: inline-block;
      margin: 24px auto 0;
      padding: 12px 24px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: inherit;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.25);
      transition: background var(--transition), border-color var(--transition), transform var(--transition);
    }

    .link-button:hover,
    .link-button:focus-visible {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-1px);
    }

    .sub-text {
      margin-top: 8px;
      font-size: 18px;
      color: var(--subtext);
    }
.sub-text a {
      color: var(--accent-1);
      text-decoration: none;
    }
    body.light {
      --bg: #f5f5f5;
      --text: #111;
      --subtext: #444;
      --surface: rgba(255, 255, 255, 0.55);
      --surface-border: rgba(0, 0, 0, 0.15);
      --accent-1: #ffe066;
      --accent-2: rgba(0, 160, 255, 0.25);
      --shape-1: rgba(244, 63, 93, 0.34);
      --shape-2: rgba(255, 191, 0, 0.35);
    }

    body.light .theme-toggle {
      color: #111;
    }
  </style>
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false">
    Switch to light theme
  </button>

  <div class="shape"></div>
  <div class="shape alt"></div>

  <main>
    <h1 class="top-text">vortex.fun</h1>
    <p class="sub-text">Games And Statistics Website (NEA)</p>
    <p class="sub-text">Add Description Here</p>
    <a class="link-button" href="flyingbird.html">Play Flying Bird</a>
  </main>

  <footer class="bottom-text">Have fun!</footer>

  <script>
    const body = document.body;
    const toggle = document.getElementById('theme-toggle');
    const storedTheme = localStorage.getItem('theme');
    const preferredTheme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    const theme = storedTheme || preferredTheme;

    if (theme === 'light') {
      body.classList.add('light');
    }

    const updateToggle = () => {
      const isLight = body.classList.contains('light');
      toggle.textContent = isLight ? 'Switch to dark theme' : 'Switch to light theme';
      toggle.setAttribute('aria-pressed', String(isLight));
    };

    updateToggle();

    toggle.addEventListener('click', () => {
      body.classList.toggle('light');
      const nextTheme = body.classList.contains('light') ? 'light' : 'dark';
      localStorage.setItem('theme', nextTheme);
      updateToggle();
    });
  </script>
</body>
</html>
