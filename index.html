<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vortex.fun</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #000000;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.6;
      pointer-events: none;
    }

    body::before {
      width: 280px;
      height: 280px;
      top: -80px;
      left: -80px;
      background: rgb(251, 255, 0);
    }

    body::after {
      width: 280px;
      height: 280px;
      bottom: -80px;
      right: -60px;
      background: rgba(51, 255, 0, 0.575);
    }

    .shape {
      position: absolute;
      width: 240px;
      height: 240px;
      border-radius: 30%;
      background: rgba(244, 63, 93, 0.534);
      top: 15%;
      right: 10%;
      transform: rotate(25deg);
      filter: blur(0.5px);
      pointer-events: none;
    }

    .shape.alt {
      width: 200px;
      height: 200px;
      border-radius: 40%;
      background: rgba(255, 251, 0, 0.493);
      bottom: 12%;
      left: 8%;
      transform: rotate(-20deg);
    }

    .top-text {
      position: relative;
      z-index: 1;
      text-align: center;
      font-size: clamp(32px, 6vw, 48px);
      font-weight: 700;
      margin-top: 0;
      color: #b4b4b4;
      letter-spacing: 1px;
    }

    .sub-text {
      position: relative;
      z-index: 1;
      text-align: center;
      font-size: 18px;
      color: #555;
      margin-top: 8px;
    }

    .theme-toggle {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 2;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      cursor: pointer;
      backdrop-filter: blur(12px);
    }

    body.light {
      background: #f5f5f5;
      color: #111;
    }

    body.light::before {
      background: #ffe066;
    }

    body.light::after {
      background: rgba(0, 160, 255, 0.25);
    }

    body.light .shape {
      background: rgba(244, 63, 93, 0.34);
    }

    body.light .shape.alt {
      background: rgba(255, 191, 0, 0.35);
    }

    body.light .top-text {
      color: #111;
    }

    body.light .sub-text {
      color: #444;
    }
  </style>
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" type="button">Dark mode</button>
  <div class="shape"></div>
  <div class="shape alt"></div>
  <div class="top-text">vortex.fun</div>
  <div class="sub-text">Games And Tools Website (NEA)</div>
  <script>
    const body = document.body;
    const toggle = document.getElementById('theme-toggle');
    const storedTheme = localStorage.getItem('theme');

    if (storedTheme === 'light') {
      body.classList.add('light');
    }

    const updateButton = () => {
      toggle.textContent = body.classList.contains('light') ? 'Light mode' : 'Dark mode';
    };

    updateButton();

    toggle.addEventListener('click', () => {
      body.classList.toggle('light');
      const theme = body.classList.contains('light') ? 'light' : 'dark';
      localStorage.setItem('theme', theme);
      updateButton();
    });
  </script>
</body>
</html>
